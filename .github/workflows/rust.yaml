# SPDX-License-Identifier: Apache-2.0

on:
    push:
      branches:
        - main
        - 'feature/**'
    pull_request:

name: Rust

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: ["1.86", stable, nightly]
    continue-on-error: ${{ matrix.rust == 'nightly' }}

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
          toolchain: ${{ matrix.rust }}
          targets: thumbv6m-none-eabi
          components: rustfmt, clippy
    - name: Check formatting
      if: matrix.rust == 'stable'
      run: cargo fmt --all -- --check
    # The workspace-wide clippy/doc steps build ct-ctgrind, whose
    # crabgrind dep compiles against Valgrind's C headers on Linux.
    - name: Install Valgrind (crabgrind headers)
      if: matrix.rust == 'stable'
      run: sudo apt-get update && sudo apt-get install -y valgrind
    - name: Run clippy
      if: matrix.rust == 'stable'
      run: cargo clippy --workspace --all-targets -- -D warnings
    - name: Check docs
      if: matrix.rust == 'stable'
      run: cargo doc --workspace --no-deps
      env:
        RUSTDOCFLAGS: -D warnings
    - name: Build
      working-directory: modmath
      run: cargo build
    # The MSRV row proves the library builds on 1.86; tests pull the
    # backend-matrix dev-deps (git forks of bnum / crypto-bigint), whose
    # MSRV is newer and doesn't constrain modmath's consumers.
    - name: Run tests
      if: matrix.rust != '1.86'
      working-directory: modmath
      run: cargo test --verbose
    # fixed-bigint/nightly on the CLI: the dev-dep needs its own
    # const_trait_impl gate active once c0nst/nightly is unified on,
    # and manifest features can't reach dev-deps.
    - name: Run tests with nightly feature
      if: matrix.rust == 'nightly'
      working-directory: modmath
      run: cargo test --verbose --features nightly,fixed-bigint/nightly
