[profiles.jtrace-f407]
runner = "command"
target = "thumbv7em-none-eabihf"
executable = "probe-rs"
args = [
  "run",
  "--chip", "STM32F407VGTx",
  "--protocol", "swd",
  "--probe", "1366:1020:001224000224",
  "--non-interactive",
  "--disable-progressbars",
  "--no-location",
  "{artifact}",
]
completion-marker = "EM_SUMMARY"
completion-action = "interrupt"
timeout-seconds = 120
target-dir = "target"
artifact-extension = ""

[[case-sets.modmath-cyccnt]]
name = "modmath"
binary = "modmath-cyccnt-hardware"
expected-suite = "modmath-cyccnt"

[campaigns.modmath-jtrace-f407]
profile = "jtrace-f407"
case-set = "modmath-cyccnt"

